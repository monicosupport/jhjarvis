<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>J.A.R.V.I.S. — Local AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --c: #00d4ff;       /* primary cyan */
    --g: #00ff9d;       /* accent green */
    --p: #bd00ff;       /* accent purple */
    --r: #ff003c;       /* danger red */
    --o: #ff8c00;       /* warning orange */
    --bg: #020a14;
    --bg2: #040e1c;
    --glass: rgba(0,212,255,.06);
    --glow: 0 0 20px rgba(0,212,255,.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: #c8e8f0; font-family: 'Exo 2', sans-serif; }

  /* ── Scanline overlay ── */
  body::before {
    content:''; position:fixed; inset:0; z-index:9999; pointer-events:none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
  }

  /* ── Grid background ── */
  body::after {
    content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(0,212,255,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift { to { background-position: 60px 60px; } }

  /* ── Glass panels ── */
  .panel {
    background: linear-gradient(135deg, rgba(0,212,255,.05), rgba(0,0,0,.4));
    border: 1px solid rgba(0,212,255,.15);
    backdrop-filter: blur(8px);
    position: relative;
    border-radius: 12px;
    overflow: hidden;
  }
  .panel::before {
    content:''; position:absolute; inset:0; border-radius:inherit;
    background: linear-gradient(135deg, rgba(0,212,255,.06) 0%, transparent 50%);
    pointer-events:none;
  }
  .panel-purple { border-color: rgba(189,0,255,.2); background: linear-gradient(135deg, rgba(189,0,255,.05), rgba(0,0,0,.4)); }
  .panel-purple::before { background: linear-gradient(135deg, rgba(189,0,255,.06) 0%, transparent 50%); }
  .panel-green  { border-color: rgba(0,255,157,.2); background: linear-gradient(135deg, rgba(0,255,157,.04), rgba(0,0,0,.4)); }
  .panel-green::before  { background: linear-gradient(135deg, rgba(0,255,157,.05) 0%, transparent 50%); }

  .panel-header {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(0,212,255,.1);
    display: flex; align-items: center; gap: 8px;
    font-family: 'Orbitron', monospace;
    font-size: 10px; letter-spacing: .2em; color: rgba(0,212,255,.7);
    text-transform: uppercase;
  }
  .panel-header .dot { width:6px; height:6px; border-radius:50%; background:var(--c); box-shadow:0 0 6px var(--c); }
  .panel-header.green  { border-color:rgba(0,255,157,.1); color:rgba(0,255,157,.7); }
  .panel-header.green  .dot { background:var(--g); box-shadow:0 0 6px var(--g); }
  .panel-header.purple { border-color:rgba(189,0,255,.15); color:rgba(189,0,255,.7); }
  .panel-header.purple .dot { background:var(--p); box-shadow:0 0 6px var(--p); }

  /* ── HUD text styles ── */
  .orb  { font-family: 'Orbitron', monospace; }
  .mono { font-family: 'Share Tech Mono', monospace; }

  /* ── Glow effects ── */
  .glow-c { text-shadow: 0 0 12px var(--c), 0 0 24px rgba(0,212,255,.4); }
  .glow-g { text-shadow: 0 0 12px var(--g), 0 0 24px rgba(0,255,157,.4); }
  .glow-p { text-shadow: 0 0 12px var(--p), 0 0 24px rgba(189,0,255,.4); }

  /* ── Core orb canvas ── */
  #orb-canvas { position:absolute; inset:0; width:100%; height:100%; }

  /* ── Chat ── */
  #chat-log {
    flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px;
    scroll-behavior:smooth;
  }
  #chat-log::-webkit-scrollbar { width:4px; }
  #chat-log::-webkit-scrollbar-track { background: transparent; }
  #chat-log::-webkit-scrollbar-thumb { background: rgba(0,212,255,.25); border-radius:2px; }

  .msg {
    max-width: 86%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.55;
    position: relative;
    animation: msgIn .25s ease;
  }
  @keyframes msgIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .msg-user {
    align-self: flex-end;
    background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(0,212,255,.07));
    border: 1px solid rgba(0,212,255,.3);
    color: #d0f0ff;
  }
  .msg-user::after {
    content:''; position:absolute; bottom:10px; right:-6px;
    border: 6px solid transparent;
    border-left-color: rgba(0,212,255,.3);
  }

  .msg-ai {
    align-self: flex-start;
    background: linear-gradient(135deg, rgba(189,0,255,.1), rgba(0,0,0,.3));
    border: 1px solid rgba(189,0,255,.25);
    color: #e8d8ff;
  }
  .msg-ai::after {
    content:''; position:absolute; bottom:10px; left:-6px;
    border: 6px solid transparent;
    border-right-color: rgba(189,0,255,.25);
  }

  .msg-sys {
    align-self: center;
    background: rgba(0,212,255,.05);
    border: 1px solid rgba(0,212,255,.12);
    color: rgba(0,212,255,.5);
    font-size: 10px;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing:.08em;
    border-radius: 6px;
    padding: 4px 10px;
    max-width: 100%;
    text-align: center;
  }

  .msg-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: .15em;
    margin-bottom: 4px;
    opacity: .6;
  }

  /* ── Typing indicator ── */
  .typing-dot { width:6px; height:6px; border-radius:50%; background:var(--p); animation: blink 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay:.2s; }
  .typing-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* ── Input bar ── */
  #input-bar {
    padding: 12px 16px;
    border-top: 1px solid rgba(0,212,255,.1);
    display: flex; gap: 8px; align-items: center;
    background: linear-gradient(0deg, rgba(0,0,0,.4), transparent);
  }
  #msg-input {
    flex:1; background: rgba(0,212,255,.06); border: 1px solid rgba(0,212,255,.2);
    border-radius: 8px; padding: 10px 14px; color: #c8e8f0; font-size:13px;
    font-family:'Exo 2',sans-serif; outline:none; resize:none; min-height:42px; max-height:100px;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: rgba(0,212,255,.5); box-shadow: 0 0 0 2px rgba(0,212,255,.08); }
  #msg-input::placeholder { color: rgba(0,212,255,.25); }

  .btn-icon {
    width:40px; height:40px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    border:1px solid; cursor:pointer; transition:.2s; font-size:14px; flex-shrink:0;
  }
  #mic-btn  { border-color:rgba(0,255,157,.3); color:rgba(0,255,157,.7); background:rgba(0,255,157,.06); }
  #mic-btn:hover  { background:rgba(0,255,157,.14); color:var(--g); }
  #mic-btn.active { background:rgba(0,255,157,.2); color:var(--g); box-shadow:0 0 12px rgba(0,255,157,.4); animation:micPulse .8s infinite; }
  @keyframes micPulse { 50%{ box-shadow:0 0 20px rgba(0,255,157,.6); } }
  #send-btn { border-color:rgba(0,212,255,.3); color:rgba(0,212,255,.7); background:rgba(0,212,255,.06); }
  #send-btn:hover { background:rgba(0,212,255,.14); color:var(--c); }
  #send-btn:active { transform:scale(.95); }

  /* ── Metric bars ── */
  .metric-bar {
    height: 4px; border-radius: 2px; background: rgba(255,255,255,.07); overflow:hidden;
  }
  .metric-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--c), rgba(0,212,255,.5));
    transition: width .5s ease;
  }
  .metric-bar-fill.warn  { background: linear-gradient(90deg, var(--o), rgba(255,140,0,.5)); }
  .metric-bar-fill.crit  { background: linear-gradient(90deg, var(--r), rgba(255,0,60,.5)); }

  /* ── Stat boxes ── */
  .stat-box {
    background: rgba(0,212,255,.05); border:1px solid rgba(0,212,255,.1);
    border-radius:8px; padding:8px 10px; text-align:center;
  }
  .stat-val { font-family:'Orbitron',monospace; font-size:16px; font-weight:700; color:var(--c); }
  .stat-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; color:rgba(0,212,255,.4); margin-top:2px; letter-spacing:.12em; }

  /* ── Log entries ── */
  .log-entry { font-family:'Share Tech Mono',monospace; font-size:10px; padding:3px 0; border-bottom:1px solid rgba(0,212,255,.05); }
  .log-ok   { color:rgba(0,255,157,.7); }
  .log-warn { color:rgba(255,140,0,.8); }
  .log-err  { color:rgba(255,0,60,.8); }
  .log-info { color:rgba(0,212,255,.5); }

  /* ── Agent chip ── */
  .agent-chip {
    background: rgba(0,255,157,.06); border:1px solid rgba(0,255,157,.2); border-radius:6px;
    padding:6px 10px; display:flex; align-items:center; gap:8px; font-size:11px;
  }
  .agent-chip .status-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .agent-chip .status-dot.run  { background:var(--g); box-shadow:0 0 6px var(--g); animation:statusPulse 1.5s infinite; }
  .agent-chip .status-dot.done { background:rgba(0,212,255,.5); }
  .agent-chip .status-dot.fail { background:var(--r); }
  @keyframes statusPulse { 50%{ opacity:.4; } }

  /* ── Animations ── */
  .spin-slow  { animation: spin 12s linear infinite; }
  .spin-fast  { animation: spin 4s linear infinite; }
  .spin-rev   { animation: spin 8s linear infinite reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .pulse-ring {
    position:absolute; inset:-8px; border-radius:50%;
    border: 1px solid rgba(0,212,255,.3);
    animation: pulseRing 2.5s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay:.8s; }
  .pulse-ring:nth-child(3) { animation-delay:1.6s; }
  @keyframes pulseRing { 0%{transform:scale(.8);opacity:.6} 100%{transform:scale(1.5);opacity:0} }

  /* ── Status indicator ── */
  #status-pill {
    display:inline-flex; align-items:center; gap:6px;
    padding:3px 10px; border-radius:20px;
    font-family:'Orbitron',monospace; font-size:9px; letter-spacing:.15em;
    border: 1px solid rgba(255,140,0,.4); background:rgba(255,140,0,.08); color:rgba(255,140,0,.8);
    transition:.4s;
  }
  #status-pill.online { border-color:rgba(0,255,157,.4); background:rgba(0,255,157,.08); color:rgba(0,255,157,.8); }
  #status-pill .blink-dot { width:5px; height:5px; border-radius:50%; background:currentColor; animation:blink 1.2s infinite; }

  /* ── Wake word indicator ── */
  #wake-bar { height:2px; background:transparent; transition:.3s; }
  #wake-bar.active { background:linear-gradient(90deg,transparent,var(--g),transparent); box-shadow:0 0 8px var(--g); }

  /* ── Model selector ── */
  #model-sel {
    background:rgba(0,212,255,.05); border:1px solid rgba(0,212,255,.15);
    border-radius:6px; padding:4px 8px; color:rgba(0,212,255,.7); font-size:11px;
    font-family:'Share Tech Mono',monospace; outline:none; cursor:pointer;
    appearance:none; -webkit-appearance:none;
  }

  /* ── Mobile ── */
  @media (max-width:768px) {
    #sidebar-left, #sidebar-right { display:none; }
    #main-col { flex:1 !important; }
    .msg { max-width:96%; }
  }

  /* ── Corner decorations ── */
  .corner-tl::before, .corner-tr::before, .corner-bl::before, .corner-br::before {
    content:''; position:absolute; width:12px; height:12px;
    border-color:rgba(0,212,255,.4); border-style:solid;
  }
  .corner-tl::before { top:0;left:0; border-width:2px 0 0 2px; }
  .corner-tr::before { top:0;right:0; border-width:2px 2px 0 0; }
  .corner-bl::after  { content:''; position:absolute; bottom:0;left:0; width:12px; height:12px; border:2px solid rgba(0,212,255,.4); border-width:0 0 2px 2px; }
  .corner-br::after  { content:''; position:absolute; bottom:0;right:0; width:12px; height:12px; border:2px solid rgba(0,212,255,.4); border-width:0 2px 2px 0; }

  /* ── Scrollbar global ── */
  ::-webkit-scrollbar { width:3px; height:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:rgba(0,212,255,.2); border-radius:2px; }
</style>
</head>
<body class="relative z-10">

<!-- ═══════════════════════════════════════════════════════ HEADER -->
<header class="relative z-20 flex items-center justify-between px-4 py-2.5 border-b border-[rgba(0,212,255,.12)]"
        style="background:linear-gradient(180deg,rgba(0,20,40,.95),rgba(2,10,20,.9))">

  <!-- Logo -->
  <div class="flex items-center gap-3">
    <div class="relative w-10 h-10 flex items-center justify-center flex-shrink-0">
      <div class="absolute inset-0 rounded-full border border-dashed border-[rgba(0,212,255,.3)] spin-slow"></div>
      <div class="absolute inset-[3px] rounded-full border border-[rgba(0,212,255,.4)] spin-rev"></div>
      <div id="core-dot" class="w-3 h-3 rounded-full bg-[var(--c)] shadow-[0_0_10px_var(--c)]"
           style="animation:blink 2s ease-in-out infinite"></div>
    </div>
    <div>
      <div class="orb text-lg font-black tracking-[.25em] text-[var(--c)] glow-c leading-none">J.A.R.V.I.S.</div>
      <div class="mono text-[9px] tracking-[.2em] text-[rgba(0,212,255,.35)] mt-0.5">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
    </div>
  </div>

  <!-- Center metrics -->
  <div class="hidden md:flex items-center gap-5 mono text-[10px]">
    <div class="flex items-center gap-2 text-[rgba(0,255,157,.6)]">
      <i class="fas fa-robot text-xs"></i>
      <span>AGENTS </span><span id="hdr-agents" class="text-[var(--g)] font-bold ml-1">0</span>
    </div>
    <div class="flex items-center gap-2 text-[rgba(255,140,0,.6)]">
      <i class="fas fa-code text-xs"></i>
      <span>REWRITES </span><span id="hdr-rewrites" class="text-[var(--o)] font-bold ml-1">0</span>
    </div>
    <div class="flex items-center gap-2 text-[rgba(189,0,255,.6)] cursor-pointer hover:text-[var(--p)]"
         onclick="showMemoryPanel()" title="Memory">
      <i class="fas fa-brain text-xs"></i>
      <span>MEM </span><span id="hdr-mem" class="text-[var(--p)] font-bold ml-1">0</span>
    </div>
  </div>

  <!-- Right: status + clock -->
  <div class="flex items-center gap-4">
    <div id="status-pill">
      <span class="blink-dot"></span>
      <span id="status-txt">CONNECTING</span>
    </div>
    <div class="text-right hidden sm:block">
      <div id="clk" class="orb text-sm font-bold text-[var(--c)] tracking-widest leading-none">00:00:00</div>
      <div id="clkd" class="mono text-[9px] text-[rgba(0,212,255,.35)] mt-0.5"></div>
    </div>
  </div>
</header>
<div id="wake-bar"></div>

<!-- ═══════════════════════════════════════════════════════ MAIN LAYOUT -->
<div class="flex gap-0" style="height:calc(100vh - 52px); position:relative; z-index:10">

  <!-- ────────────────────── LEFT SIDEBAR ── -->
  <aside id="sidebar-left" class="w-[240px] flex flex-col gap-3 p-3 border-r border-[rgba(0,212,255,.08)] overflow-y-auto flex-shrink-0"
         style="background:rgba(2,10,20,.6)">

    <!-- Core orb -->
    <div class="panel relative overflow-hidden" style="height:180px">
      <canvas id="orb-canvas" width="240" height="180"></canvas>
      <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
        <div id="core-text" class="orb text-xs font-bold text-[var(--c)] tracking-widest glow-c">STANDBY</div>
        <div id="core-sub"  class="mono text-[9px] text-[rgba(0,212,255,.4)] mt-1">AWAITING INPUT</div>
      </div>
    </div>

    <!-- RAM / CPU -->
    <div class="panel p-3 space-y-3">
      <div class="panel-header" style="padding:0 0 6px; border:none; margin-bottom:0">
        <div class="dot"></div>SYSTEM
      </div>
      <div>
        <div class="flex justify-between mono text-[10px] mb-1">
          <span class="text-[rgba(0,212,255,.5)]">CPU</span>
          <span id="cpu-pct" class="text-[var(--c)]">0%</span>
        </div>
        <div class="metric-bar"><div id="cpu-bar" class="metric-bar-fill" style="width:0%"></div></div>
      </div>
      <div>
        <div class="flex justify-between mono text-[10px] mb-1">
          <span class="text-[rgba(0,212,255,.5)]">RAM</span>
          <span id="ram-pct" class="text-[var(--c)]">0%</span>
        </div>
        <div class="metric-bar"><div id="ram-bar" class="metric-bar-fill" style="width:0%"></div></div>
      </div>
      <div>
        <div class="flex justify-between mono text-[10px] mb-1">
          <span class="text-[rgba(0,212,255,.5)]">STORAGE</span>
          <span id="disk-pct" class="text-[var(--c)]">0%</span>
        </div>
        <div class="metric-bar"><div id="disk-bar" class="metric-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="grid grid-cols-2 gap-2 mt-1">
        <div class="stat-box">
          <div id="temp-val" class="stat-val text-sm">--°</div>
          <div class="stat-lbl">TEMP</div>
        </div>
        <div class="stat-box">
          <div id="bat-val" class="stat-val text-sm">--%</div>
          <div class="stat-lbl">BATTERY</div>
        </div>
      </div>
    </div>

    <!-- Model selector -->
    <div class="panel p-3">
      <div class="panel-header" style="padding:0 0 8px; border:none">
        <div class="dot"></div>MODEL
      </div>
      <select id="model-sel" class="w-full">
        <option value="">Loading...</option>
      </select>
      <div id="compat-info" class="mono text-[9px] text-[rgba(0,212,255,.3)] mt-2 leading-relaxed"></div>
    </div>

    <!-- Syslog -->
    <div class="panel flex-1 overflow-hidden flex flex-col" style="min-height:100px">
      <div class="panel-header"><div class="dot"></div>SYSLOG</div>
      <div id="syslog" class="flex-1 overflow-y-auto p-2 space-y-0.5"></div>
    </div>
  </aside>

  <!-- ────────────────────── CENTER (CHAT) ── -->
  <main id="main-col" class="flex-1 flex flex-col overflow-hidden min-w-0">
    <div id="chat-log"></div>
    <div id="typing-indicator" class="hidden px-4 pb-2">
      <div class="msg msg-ai" style="padding:8px 14px; max-width:80px">
        <div class="flex gap-1 items-center">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>
    <div id="input-bar">
      <button id="mic-btn" class="btn-icon" onclick="toggleMic()" title="Hold to speak / Say 'Hey Jarvis'">
        <i class="fas fa-microphone"></i>
      </button>
      <textarea id="msg-input" placeholder="Talk to J.A.R.V.I.S. — or say 'Hey Jarvis'…" rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
      <button id="send-btn" class="btn-icon" onclick="sendMsg()" title="Send">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </main>

  <!-- ────────────────────── RIGHT SIDEBAR ── -->
  <aside id="sidebar-right" class="w-[220px] flex flex-col gap-3 p-3 border-l border-[rgba(0,212,255,.08)] overflow-y-auto flex-shrink-0"
         style="background:rgba(2,10,20,.6)">

    <!-- Sub-agents -->
    <div class="panel panel-green flex flex-col" style="min-height:140px">
      <div class="panel-header green"><div class="dot"></div>SUB-AGENTS</div>
      <div id="agent-list" class="flex-1 p-2 space-y-1.5 overflow-y-auto">
        <div class="mono text-[10px] text-[rgba(0,255,157,.25)] text-center pt-4">No agents running</div>
      </div>
      <div class="p-2 border-t border-[rgba(0,255,157,.1)]">
        <button onclick="spawnAgent()" class="w-full py-1.5 rounded-md orb text-[9px] tracking-widest
               border border-[rgba(0,255,157,.3)] text-[rgba(0,255,157,.6)] hover:bg-[rgba(0,255,157,.1)]
               hover:text-[var(--g)] transition-all">
          <i class="fas fa-plus mr-1"></i>SPAWN AGENT
        </button>
      </div>
    </div>

    <!-- Comm log -->
    <div class="panel panel-purple flex-1 flex flex-col overflow-hidden">
      <div class="panel-header purple"><div class="dot"></div>COMM LOG</div>
      <div id="comm-log" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
    </div>

    <!-- Quick actions -->
    <div class="panel p-3 space-y-2">
      <div class="panel-header" style="padding:0 0 8px;border:none"><div class="dot"></div>ACTIONS</div>
      <button onclick="sendMsg('run device scan')"
              class="w-full py-1.5 rounded mono text-[10px] border border-[rgba(0,212,255,.2)]
                     text-[rgba(0,212,255,.5)] hover:bg-[rgba(0,212,255,.08)] hover:text-[var(--c)] transition-all">
        <i class="fas fa-microchip mr-1"></i>DEVICE SCAN
      </button>
      <button onclick="sendMsg('rewrite yourself to be faster')"
              class="w-full py-1.5 rounded mono text-[10px] border border-[rgba(255,140,0,.2)]
                     text-[rgba(255,140,0,.5)] hover:bg-[rgba(255,140,0,.08)] hover:text-[var(--o)] transition-all">
        <i class="fas fa-sync mr-1"></i>SELF-REWRITE
      </button>
      <button onclick="showMemoryPanel()"
              class="w-full py-1.5 rounded mono text-[10px] border border-[rgba(189,0,255,.25)]
                     text-[rgba(189,0,255,.5)] hover:bg-[rgba(189,0,255,.08)] hover:text-[var(--p)] transition-all">
        <i class="fas fa-brain mr-1"></i>MEMORY CORE
      </button>
    </div>
  </aside>
</div>

<!-- ═══════════════════════════════════════════════════════ MEMORY MODAL -->
<div id="mem-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="hideMemoryPanel()"></div>
  <div class="relative panel panel-purple p-6 w-[360px] z-10 corner-tl corner-tr corner-bl corner-br"
       style="background:rgba(5,2,20,.95)">
    <h2 class="orb text-sm font-bold text-[var(--p)] tracking-widest mb-5 flex items-center gap-2">
      <i class="fas fa-brain"></i> MEMORY CORE
    </h2>
    <div class="space-y-3 mb-5">
      <div class="flex justify-between mono text-xs">
        <span class="text-[rgba(0,212,255,.5)]">Saved messages</span>
        <span id="modal-mem-count" class="text-[var(--p)] font-bold">—</span>
      </div>
      <div class="flex justify-between mono text-xs">
        <span class="text-[rgba(0,212,255,.5)]">Profile name</span>
        <span id="modal-profile-name" class="text-[var(--g)]">—</span>
      </div>
      <div id="modal-summary" class="mono text-[10px] text-[rgba(0,212,255,.35)] italic leading-relaxed p-2
           border border-[rgba(189,0,255,.1)] rounded-md bg-[rgba(189,0,255,.03)]"></div>
    </div>
    <div class="flex gap-2">
      <button onclick="refreshMemModal()"
              class="flex-1 py-2 rounded mono text-[10px] border border-[rgba(0,212,255,.2)]
                     text-[rgba(0,212,255,.5)] hover:bg-[rgba(0,212,255,.08)] transition-all">
        <i class="fas fa-sync mr-1"></i>REFRESH
      </button>
      <button onclick="clearMemory()"
              class="flex-1 py-2 rounded mono text-[10px] border border-[rgba(255,0,60,.25)]
                     text-[rgba(255,0,60,.5)] hover:bg-[rgba(255,0,60,.08)] transition-all">
        <i class="fas fa-trash mr-1"></i>CLEAR
      </button>
      <button onclick="hideMemoryPanel()"
              class="px-4 py-2 rounded mono text-[10px] border border-[rgba(0,212,255,.15)]
                     text-[rgba(0,212,255,.35)] hover:bg-[rgba(0,212,255,.05)] transition-all">
        ESC
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ SCRIPTS -->
<script>
// ── Config ────────────────────────────────────────────────────────────
const BASE = 'http://localhost:8000';
const POLL = 4000;
const WAKE_WORDS = ['hey jarvis', 'jarvis', 'hey j.a.r.v.i.s.'];
const TTS = { enabled: true, rate: 0.92, pitch: 0.8, volume: 1.0 };

// ── State ─────────────────────────────────────────────────────────────
let online = false, speaking = false, recognition = null;
let history = [], model = '', rewriteCount = 0, memCount = 0;
let userProfile = { name: 'Boss' };
let deviceCompat = { low_ram: false, arm32: false, offline_mode: false, recommended_model: 'llama3.2:1b', num_ctx: 2048, ram_mb: 4096 };
const SPEECH_AVAILABLE = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
const TTS_AVAILABLE = !!(window.speechSynthesis);

// ── Clock ─────────────────────────────────────────────────────────────
function tickClock() {
  const n = new Date();
  document.getElementById('clk').innerText = n.toLocaleTimeString('en',{hour12:false});
  document.getElementById('clkd').innerText = n.toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}
setInterval(tickClock, 1000); tickClock();

// ── Orb canvas ────────────────────────────────────────────────────────
(function orbCanvas() {
  const cvs = document.getElementById('orb-canvas');
  if (!cvs) return;
  const ctx = cvs.getContext('2d');
  let particles = [], t = 0;
  for (let i = 0; i < 35; i++) {
    particles.push({ r: 30 + Math.random()*60, a: Math.random()*Math.PI*2, s: (.0003+Math.random()*.0008)*(Math.random()<.5?1:-1),
      size: .8+Math.random()*2, c: Math.random() > .7 ? '#00ff9d' : '#00d4ff', alpha: .2+Math.random()*.6 });
  }
  function draw() {
    ctx.clearRect(0,0,cvs.width,cvs.height);
    const cx=cvs.width/2, cy=cvs.height/2;
    // rings
    [50,70,90].forEach((r,i)=>{
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,212,255,${.04+i*.02})`; ctx.lineWidth=1; ctx.stroke();
    });
    // rotating dashed ring
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(t*.2);
    ctx.beginPath(); ctx.arc(0,0,62,0,Math.PI*2);
    ctx.setLineDash([4,8]); ctx.strokeStyle='rgba(0,212,255,.2)'; ctx.lineWidth=1; ctx.stroke();
    ctx.restore();
    // particles
    particles.forEach(p => {
      p.a += p.s;
      const x = cx + Math.cos(p.a)*p.r, y = cy + Math.sin(p.a)*p.r;
      ctx.beginPath(); ctx.arc(x,y,p.size,0,Math.PI*2);
      ctx.fillStyle = p.c.replace(')',`,${p.alpha})`).replace('rgb','rgba'); ctx.fill();
    });
    // core glow
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,28);
    g.addColorStop(0,'rgba(0,212,255,.25)'); g.addColorStop(1,'rgba(0,212,255,0)');
    ctx.beginPath(); ctx.arc(cx,cy,28,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    // center dot
    ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.fillStyle='rgba(0,212,255,.9)'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx,cy,3,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.fill();
    t++; requestAnimationFrame(draw);
  }
  draw();
})();

// ── Syslog ────────────────────────────────────────────────────────────
function sysLog(msg, type='info') {
  const el = document.getElementById('syslog');
  const d = document.createElement('div');
  d.className = `log-entry log-${type}`;
  const ts = new Date().toLocaleTimeString('en',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  d.textContent = `[${ts}] ${msg}`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
  if (el.children.length > 100) el.removeChild(el.children[0]);
}

// ── Comm log ──────────────────────────────────────────────────────────
function commLog(from, msg, type='info') {
  const el = document.getElementById('comm-log');
  const d = document.createElement('div');
  const colors = {info:'rgba(0,212,255,.5)', ok:'rgba(0,255,157,.6)', warn:'rgba(255,140,0,.6)', err:'rgba(255,0,60,.6)', sys:'rgba(189,0,255,.5)'};
  d.style.cssText = `font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 0;border-bottom:1px solid rgba(0,212,255,.05);color:${colors[type]||colors.info}`;
  d.innerHTML = `<span style="opacity:.5">[${from}]</span> ${msg}`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
  if (el.children.length > 60) el.removeChild(el.children[0]);
}

// ── Core text ─────────────────────────────────────────────────────────
function setCoreText(main, sub) {
  document.getElementById('core-text').textContent = main || 'READY';
  if (sub !== undefined) document.getElementById('core-sub').textContent = sub || '';
}

// ── Chat messages ─────────────────────────────────────────────────────
function addMsg(role, text) {
  const log = document.getElementById('chat-log');
  const wrap = document.createElement('div');
  const cls = role === 'user' ? 'msg msg-user' : role === 'sys' ? 'msg msg-sys' : 'msg msg-ai';
  wrap.className = cls;

  if (role !== 'sys') {
    const lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.style.color = role === 'user' ? 'rgba(0,212,255,.5)' : 'rgba(189,0,255,.5)';
    lbl.textContent = role === 'user' ? '▸ YOU' : '▸ J.A.R.V.I.S.';
    wrap.appendChild(lbl);
  }

  const body = document.createElement('div');
  body.textContent = text;
  wrap.appendChild(body);
  log.appendChild(wrap);
  log.scrollTop = log.scrollHeight;
  return wrap;
}

function showTyping(show) {
  document.getElementById('typing-indicator').classList.toggle('hidden', !show);
  const log = document.getElementById('chat-log');
  log.scrollTop = log.scrollHeight;
}

// ── TTS ───────────────────────────────────────────────────────────────
function speak(text) {
  if (!TTS.enabled || !TTS_AVAILABLE) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[#*`_~\[\]()>]/g,'').replace(/\n/g,' ').slice(0,300);
  const u = new SpeechSynthesisUtterance(clean);
  u.rate = TTS.rate; u.pitch = TTS.pitch; u.volume = TTS.volume;
  window.speechSynthesis.speak(u);
}

// ── Slang expander ────────────────────────────────────────────────────
const SLANG = {
  'yk':'you know','rn':'right now','fr':'for real','ngl':'not gonna lie','tbh':'to be honest',
  'imo':'in my opinion','imho':'in my honest opinion','lmk':'let me know','asap':'as soon as possible',
  'afk':'away from keyboard','brb':'be right back','idk':'I don\'t know','iirc':'if I recall correctly',
  'lol':'laughing out loud','btw':'by the way','afaik':'as far as I know','dm':'direct message',
  'irl':'in real life','smh':'shaking my head','fyi':'for your information','tbf':'to be fair',
  'w/':'with','w/o':'without','pls':'please','plz':'please','thx':'thanks','ty':'thank you',
  'bc':'because','cuz':'because','gonna':'going to','wanna':'want to','kinda':'kind of',
  'sorta':'sort of','gotta':'got to','tryna':'trying to','boutta':'about to','ima':'I am going to',
  'lowkey':'somewhat','highkey':'definitely','bussin':'excellent','bet':'agreed','sheesh':'wow',
  'slay':'do great','cap':'lie','no cap':'no lie','periodt':'period','finna':'going to',
  'prolly':'probably','obv':'obviously','legit':'legitimately','cya':'see you','ttyl':'talk to you later',
};
function expandSlang(txt) {
  return txt.split(/\b/).map(w=>SLANG[w.toLowerCase()]||w).join('');
}

// ── Send message ──────────────────────────────────────────────────────
async function sendMsg(presetMsg) {
  const input = document.getElementById('msg-input');
  const raw = (presetMsg !== undefined ? presetMsg : input.value).trim();
  if (!raw) return;
  if (!presetMsg) input.value = '';
  if (!online) { addMsg('sys','[ OFFLINE — backend not connected ]'); return; }

  const expanded = expandSlang(raw);
  addMsg('user', raw);
  setCoreText('PROCESSING', 'ANALYZING INPUT');
  showTyping(true);
  document.getElementById('core-dot').style.cssText = 'width:12px;height:12px;border-radius:50%;background:var(--p);box-shadow:0 0 14px var(--p);animation:blink .6s ease-in-out infinite';

  history.push({ role: 'user', content: expanded });
  if (history.length > 30) history = history.slice(-30);

  try {
    const res = await fetch(`${BASE}/api/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ message: expanded, model: model || 'llama3', history: history.slice(-20), save: true })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.response);

    const reply = data.response || '';
    history.push({ role:'assistant', content: reply });

    if (data.memory_count) {
      memCount = data.memory_count;
      document.getElementById('hdr-mem').innerText = memCount;
    }

    showTyping(false);
    addMsg('ai', reply);
    speak(reply);
    setCoreText('READY', 'AWAITING INPUT');

    // Check for self-rewrite
    if (reply.toLowerCase().includes('rewriting') || reply.toLowerCase().includes('self-rewrite')) {
      rewriteCount++;
      document.getElementById('hdr-rewrites').innerText = rewriteCount;
    }
    commLog('AI', reply.slice(0,60)+'…', 'ok');
  } catch(e) {
    showTyping(false);
    addMsg('sys', `[ ERROR: ${e.message} ]`);
    setCoreText('ERROR', e.message.slice(0,30));
    sysLog(`Chat error: ${e.message}`, 'err');
  }
  document.getElementById('core-dot').style.cssText = 'width:12px;height:12px;border-radius:50%;background:var(--c);box-shadow:0 0 10px var(--c);animation:blink 2s ease-in-out infinite';
}

// ── Health poll ───────────────────────────────────────────────────────
async function poll() {
  try {
    const ctl = new AbortController();
    setTimeout(() => ctl.abort(), 3000);
    const d = await (await fetch(`${BASE}/health`, { signal: ctl.signal })).json();
    if (!online) {
      online = true;
      document.getElementById('status-pill').className = 'online ' + document.getElementById('status-pill').className.replace('online','');
      document.getElementById('status-pill').classList.add('online');
      document.getElementById('status-txt').textContent = 'ONLINE';
      sysLog('Backend connected', 'ok');
      commLog('SYS', 'J.A.R.V.I.S. backend online', 'ok');
      setCoreText('ONLINE', 'SYSTEM READY');
      loadModels();
    }
  } catch(e) {
    if (online) {
      online = false;
      document.getElementById('status-pill').classList.remove('online');
      document.getElementById('status-txt').textContent = 'OFFLINE';
      sysLog('Backend connection lost', 'err');
    }
  }
}

// ── Models ────────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const d = await (await fetch(`${BASE}/api/models`)).json();
    const sel = document.getElementById('model-sel');
    sel.innerHTML = '';
    const models = d.models || [];
    if (!models.length) {
      sel.innerHTML = '<option value="">No models found</option>';
      sysLog('No Ollama models. Run: ollama pull llama3.2:1b', 'warn');
      return;
    }
    models.forEach(m => {
      const o = document.createElement('option');
      o.value = m.name; o.textContent = m.name;
      sel.appendChild(o);
    });
    model = models[0].name;
    sysLog(`Models loaded: ${models.map(m=>m.name).join(', ')}`, 'ok');
  } catch(e) { sysLog('Model load failed', 'warn'); }
}

// ── System metrics poll ───────────────────────────────────────────────
async function pollMetrics() {
  if (!online) return;
  try {
    const d = await (await fetch(`${BASE}/api/system`)).json();
    if (!d) return;
    const setBar = (id, val) => {
      const pct = Math.min(100, Math.max(0, val || 0));
      const bar = document.getElementById(id);
      const txt = document.getElementById(id.replace('-bar','-pct'));
      if (bar) { bar.style.width = pct+'%'; bar.className = 'metric-bar-fill' + (pct>85?' crit':pct>65?' warn':''); }
      if (txt) txt.textContent = pct.toFixed(0)+'%';
    };
    setBar('cpu-bar', d.cpu);
    setBar('ram-bar', d.ram);
    setBar('disk-bar', d.disk);
    if (d.temp && document.getElementById('temp-val')) document.getElementById('temp-val').textContent = d.temp+'°C';
    if (d.battery && document.getElementById('bat-val')) document.getElementById('bat-val').textContent = d.battery+'%';
  } catch(e) {}
}

// ── Compat load ───────────────────────────────────────────────────────
async function loadCompat() {
  try {
    const d = await (await fetch(`${BASE}/api/compat`, {signal: AbortSignal.timeout(3000)})).json();
    deviceCompat = d;
    const info = document.getElementById('compat-info');
    if (info) info.textContent = `${d.arch} · ${d.ram_mb}MB RAM · Android ${d.android}`;
    if (d.offline_mode || d.arm32) {
      addMsg('sys', '⚠ ARM32 / Offline mode — voice AI unavailable. Text only.');
    }
    if (!SPEECH_AVAILABLE) {
      const btn = document.getElementById('mic-btn');
      if (btn) { btn.disabled = true; btn.style.opacity = '.3'; btn.title = 'Voice unavailable in this browser'; }
    }
    if (!TTS_AVAILABLE) TTS.enabled = false;
  } catch(e) {}
}

// ── Memory ────────────────────────────────────────────────────────────
async function loadMemory() {
  try {
    const d = await (await fetch(`${BASE}/api/memory`)).json();
    memCount = d.count || 0;
    document.getElementById('hdr-mem').innerText = memCount;
    if (d.messages?.length && !history.length) {
      history = d.messages.slice(-10);
      sysLog(`Memory restored: ${memCount} messages`, 'ok');
      commLog('MEM', `${memCount} messages loaded from disk`, 'sys');
    }
  } catch(e) { sysLog('Memory load failed', 'warn'); }
}

async function loadProfile() {
  try {
    const d = await (await fetch(`${BASE}/api/profile`)).json();
    userProfile = d;
  } catch(e) {}
}

function showMemoryPanel() {
  document.getElementById('mem-modal').classList.remove('hidden');
  refreshMemModal();
}
function hideMemoryPanel() {
  document.getElementById('mem-modal').classList.add('hidden');
}
async function refreshMemModal() {
  try {
    const d = await (await fetch(`${BASE}/api/memory`)).json();
    document.getElementById('modal-mem-count').innerText = d.count || 0;
    document.getElementById('modal-profile-name').innerText = userProfile.name || '—';
    if (d.summary) document.getElementById('modal-summary').textContent = '"' + d.summary + '"';
  } catch(e) {}
}
async function clearMemory() {
  if (!confirm('Clear all memory? (backup saved first)')) return;
  try {
    await fetch(`${BASE}/api/memory/clear`, {method:'POST'});
    history = []; memCount = 0;
    document.getElementById('hdr-mem').innerText = 0;
    sysLog('Memory cleared', 'warn');
    addMsg('sys', '[ Memory cleared — fresh start ]');
  } catch(e) {}
  hideMemoryPanel();
}

// ── Sub-agents ────────────────────────────────────────────────────────
async function refreshAgents() {
  if (!online) return;
  try {
    const d = await (await fetch(`${BASE}/api/agents`)).json();
    const agents = d.agents || [];
    document.getElementById('hdr-agents').innerText = agents.filter(a=>a.status==='running').length;
    const list = document.getElementById('agent-list');
    if (!agents.length) {
      list.innerHTML = '<div class="mono text-[10px] text-[rgba(0,255,157,.25)] text-center pt-4">No agents running</div>';
      return;
    }
    list.innerHTML = '';
    agents.forEach(a => {
      const chip = document.createElement('div');
      chip.className = 'agent-chip';
      chip.innerHTML = `<span class="status-dot ${a.status==='running'?'run':a.status==='done'?'done':'fail'}"></span>
        <span class="flex-1 mono text-[10px] text-[rgba(0,255,157,.7)] truncate">${a.name||a.id}</span>
        ${a.status==='running'?`<button onclick="killAgent('${a.id}')" class="text-[rgba(255,0,60,.5)] hover:text-[var(--r)] text-[10px]"><i class="fas fa-times"></i></button>`:''}`;
      list.appendChild(chip);
    });
  } catch(e) {}
}

async function killAgent(id) {
  try { await fetch(`${BASE}/api/agents/${id}/kill`, {method:'POST'}); refreshAgents(); } catch(e) {}
}

function spawnAgent() {
  const task = prompt('Describe agent task:');
  if (task) sendMsg(`spawn agent to: ${task}`);
}

// ── Voice ─────────────────────────────────────────────────────────────
function initVoice() {
  if (!SPEECH_AVAILABLE) { sysLog('Speech API not available', 'warn'); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'en-US';
  recognition.onresult = e => {
    const t = e.results[e.results.length-1][0].transcript.trim().toLowerCase();
    const wakeHit = WAKE_WORDS.some(w => t.startsWith(w));
    if (wakeHit) {
      document.getElementById('wake-bar').classList.add('active');
      const cmd = WAKE_WORDS.reduce((s,w) => s.replace(w,''), t).trim();
      if (cmd) sendMsg(cmd);
      else { addMsg('sys','[ Wake word detected — listening... ]'); setCoreText('LISTENING','SAY YOUR COMMAND'); }
      setTimeout(() => document.getElementById('wake-bar').classList.remove('active'), 1500);
    } else if (document.getElementById('mic-btn').classList.contains('active')) {
      sendMsg(t);
    }
  };
  recognition.onerror = e => { if (e.error !== 'no-speech') sysLog(`Speech error: ${e.error}`, 'warn'); };
  recognition.onend = () => { try { recognition.start(); } catch(e) {} };
  try { recognition.start(); sysLog('Voice recognition: active', 'ok'); } catch(e) {}
}

function toggleMic() {
  const btn = document.getElementById('mic-btn');
  btn.classList.toggle('active');
  if (btn.classList.contains('active')) {
    addMsg('sys', '[ Microphone active — speak now ]');
    sysLog('Mic: open', 'ok');
  } else {
    sysLog('Mic: closed', 'info');
  }
}

// ── Boot ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  sysLog('J.A.R.V.I.S. v2.2 interface loaded', 'ok');
  addMsg('sys', '[ J.A.R.V.I.S. v2.2 — Universal Termux Edition — Initializing... ]');
  poll(); setInterval(poll, POLL);
  setInterval(pollMetrics, 3000);
  setInterval(refreshAgents, 5000);
  setTimeout(initVoice, 1200);
  document.getElementById('model-sel').addEventListener('change', e => { model = e.target.value; sysLog(`Model: ${model}`, 'ok'); });

  // Load persistent data after initial connection
  const waitOnline = setInterval(async () => {
    if (online) {
      clearInterval(waitOnline);
      await loadCompat();
      await loadProfile();
      await loadMemory();
    }
  }, 1000);
});
</script>
